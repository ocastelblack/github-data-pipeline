version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: github_postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: github_data

    ports:
      - "5432:5432"

  app:
    build: .
    container_name: github_app

    depends_on:
      - postgres

    env_file:
      - .env